<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>랜덤 웹사이트 이동</title>
</head>

<body>
    <main class="hero">
        <section class="card">
            <p class="eyebrow">Shuffle Web Guide</p>
            <h1>나에게 필요한 웹사이트로</h1>
            <p class="description">버튼을 누르면 준비된 사이트 중 하나로 랜덤하게 이동합니다.</p>
            <button id="go-button" class="go-button all-button" type="button">가기</button>
            <p class="sub-actions-label">세부 카테고리로 바로 가기</p>
            <div class="button-group">
                <button class="category-button" type="button" data-category="general">일반 자료</button>
                <button class="category-button" type="button" data-category="design">디자인 자료</button>
                <button class="category-button" type="button" data-category="rest">휴식</button>
            </div>
        </section>
    </main>
    <button id="suggestion-trigger" class="suggestion-trigger" type="button">제안</button>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
